<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#08080d"/>
<defs>
  <radialGradient id="bg1" cx="18%" cy="0%" r="42%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="bg2" cx="92%" cy="0%" r="42%">
    <stop offset="0%" stop-color="#e040fb" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#e040fb" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#22d3ee"/>
    <stop offset="100%" stop-color="#e040fb"/>
  </linearGradient>
  <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#22d3ee"/>
    <stop offset="100%" stop-color="#e040fb"/>
  </linearGradient>
</defs>
<rect width="1200" height="630" fill="url(#bg1)"/>
<rect width="1200" height="630" fill="url(#bg2)"/>

<!-- Eyebrow -->
<text x="80" y="100" font-family="DejaVu Sans Mono" font-size="22" fill="#22d3ee" font-weight="bold" letter-spacing="3">MONTE CARLO · POISSON · ELO</text>

<!-- Titre -->
<text x="80" y="200" font-family="DejaVu Sans Mono" font-size="58" fill="#e8e8f2" font-weight="bold">Qui gagne la</text>
<text x="80" y="270" font-family="DejaVu Sans Mono" font-size="58" fill="url(#acc)" font-weight="bold">Coupe du monde ?</text>

<!-- Sous-titre -->
<text x="80" y="340" font-family="Liberation Serif" font-size="22" font-style="italic" fill="#8a8aa8">13 éditions · jusqu'à 100 000 tournois rejoués</text>
<text x="80" y="385" font-family="DejaVu Sans Mono" font-size="18" fill="#8a8aa8">modèle Poisson-Elo, simulation Monte Carlo</text>

